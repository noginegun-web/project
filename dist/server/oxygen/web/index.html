<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ScumOxygen Control</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>ScumOxygen Control</h1>
      <div class="status" id="status">offline</div>
    </header>

    <section class="panel">
      <h2>Plugins</h2>
      <div class="row">
        <select id="pluginSelect"></select>
        <button id="reloadBtn">Reload</button>
        <button id="deleteBtn">Delete</button>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div class="row">
        <input id="pluginName" placeholder="New plugin name" />
        <button id="saveBtn">Save</button>
      </div>
    </section>

    <section class="panel">
      <h2>Logs</h2>
      <button id="refreshLogs">Refresh</button>
      <pre id="logs"></pre>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
